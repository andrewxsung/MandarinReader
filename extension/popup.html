<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #fff;
      color: #1a1a1a;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid #e5e5e5;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .settings-link {
      color: #888;
      text-decoration: none;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }
    .settings-link:hover { color: #333; }
    .body { padding: 14px; }
    #captureBtn {
      width: 100%;
      padding: 9px 14px;
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    #captureBtn:hover { background: #a93226; }
    #captureBtn:disabled { background: #ccc; cursor: not-allowed; }
    #status {
      margin-top: 10px;
      color: #555;
      font-size: 12px;
      min-height: 18px;
    }
    #status.error { color: #c0392b; }
    #status.success { color: #27ae60; }
    .last-capture {
      margin-top: 14px;
      padding: 10px 12px;
      background: #f7f7f7;
      border-radius: 6px;
      border: 1px solid #e5e5e5;
    }
    .last-capture .label {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }
    .last-capture .purpose {
      font-size: 12px;
      color: #333;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .last-capture .stats {
      font-size: 11px;
      color: #555;
    }
    .last-capture .stats span {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      padding: 1px 6px;
      border-radius: 10px;
      margin-right: 4px;
    }
    .last-capture .stats span.updated {
      background: #e3f2fd;
      color: #1565c0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>MandarinReader</h1>
    <a class="settings-link" id="optionsLink" title="Settings">⚙</a>
  </div>
  <div class="body">
    <button id="captureBtn">Capture This Page</button>
    <div id="status"></div>
    <div id="lastCapture"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
